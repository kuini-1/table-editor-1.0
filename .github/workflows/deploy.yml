name: Deploy Next.js (Standalone) to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PORT: ${{ secrets.PORT || '3001' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies=false

      - name: Approve build scripts (e.g. sharp)
        run: pnpm approve-builds --all

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: pnpm build

      - name: Prepare standalone assets
        run: |
          set -e
          mkdir -p .next/standalone/public
          cp -r public/* .next/standalone/public/
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/

      - name: Ensure VPS deploy directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            mkdir -p /var/www/table-editor

      - name: Upload standalone to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: ".next/standalone/*"
          target: "/var/www/table-editor"
          strip_components: 2

      - name: Restart with PM2
        uses: appleboy/ssh-action@v1.0.3
        env:
          PORT: ${{ env.PORT }}
          NODE_ENV: production
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          CONVERSION_WORKER_POOL_SIZE: ${{ secrets.CONVERSION_WORKER_POOL_SIZE }}
          CONVERSION_QUEUE_MAX_SIZE: ${{ secrets.CONVERSION_QUEUE_MAX_SIZE }}
          CONVERSION_RATE_LIMIT_COOLDOWN: ${{ secrets.CONVERSION_RATE_LIMIT_COOLDOWN }}
          KEEP_EXPORT_CSV_FILES: ${{ secrets.KEEP_EXPORT_CSV_FILES }}
          CASHSHOP_TABLE_ID: ${{ secrets.CASHSHOP_TABLE_ID }}
          DB_ACC_HOST: ${{ secrets.DB_ACC_HOST }}
          DB_ACC_USER: ${{ secrets.DB_ACC_USER }}
          DB_ACC_PASSWORD: ${{ secrets.DB_ACC_PASSWORD }}
          DB_ACC_NAME: ${{ secrets.DB_ACC_NAME }}
          DB_CHAR_HOST: ${{ secrets.DB_CHAR_HOST }}
          DB_CHAR_USER: ${{ secrets.DB_CHAR_USER }}
          DB_CHAR_PASSWORD: ${{ secrets.DB_CHAR_PASSWORD }}
          DB_CHAR_NAME: ${{ secrets.DB_CHAR_NAME }}
          JWT_TOKEN: ${{ secrets.JWT_TOKEN }}
          WEB_BRIDGE_URL: ${{ secrets.WEB_BRIDGE_URL }}
          WPS_FILES_PATH: ${{ secrets.WPS_FILES_PATH }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: PORT,NODE_ENV,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_GOOGLE_CLIENT_ID,SUPABASE_SERVICE_ROLE_KEY,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,NEXT_PUBLIC_APP_URL,CONVERSION_WORKER_POOL_SIZE,CONVERSION_QUEUE_MAX_SIZE,CONVERSION_RATE_LIMIT_COOLDOWN,KEEP_EXPORT_CSV_FILES,CASHSHOP_TABLE_ID,DB_ACC_HOST,DB_ACC_USER,DB_ACC_PASSWORD,DB_ACC_NAME,DB_CHAR_HOST,DB_CHAR_USER,DB_CHAR_PASSWORD,DB_CHAR_NAME,JWT_TOKEN,WEB_BRIDGE_URL,WPS_FILES_PATH
          script: |
            set -e
            cd /var/www/table-editor
            cat > .env.local <<EOF
            NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
            SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
            STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
            STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
            NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
            CONVERSION_WORKER_POOL_SIZE=${CONVERSION_WORKER_POOL_SIZE}
            CONVERSION_QUEUE_MAX_SIZE=${CONVERSION_QUEUE_MAX_SIZE}
            CONVERSION_RATE_LIMIT_COOLDOWN=${CONVERSION_RATE_LIMIT_COOLDOWN}
            KEEP_EXPORT_CSV_FILES=${KEEP_EXPORT_CSV_FILES}
            CASHSHOP_TABLE_ID=${CASHSHOP_TABLE_ID}
            DB_ACC_HOST=${DB_ACC_HOST}
            DB_ACC_USER=${DB_ACC_USER}
            DB_ACC_PASSWORD=${DB_ACC_PASSWORD}
            DB_ACC_NAME=${DB_ACC_NAME}
            DB_CHAR_HOST=${DB_CHAR_HOST}
            DB_CHAR_USER=${DB_CHAR_USER}
            DB_CHAR_PASSWORD=${DB_CHAR_PASSWORD}
            DB_CHAR_NAME=${DB_CHAR_NAME}
            JWT_TOKEN=${JWT_TOKEN}
            WEB_BRIDGE_URL=${WEB_BRIDGE_URL}
            WPS_FILES_PATH=${WPS_FILES_PATH}
            EOF
            if [ ! -d node_modules/mysql2 ]; then
              corepack pnpm add --prod --strict-peer-dependencies=false mysql2 sequelize pg-hstore
            fi
            export PORT="${PORT:-3001}"
            pm2 describe table-editor >/dev/null 2>&1 \
              && pm2 reload table-editor --update-env \
              || PORT="$PORT" pm2 start server.js --name table-editor

